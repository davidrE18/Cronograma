<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma 2 Semanas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0f0f11;
    --surface: #18181d;
    --border: #2a2a32;
    --accent: #c8f55a;
    --accent2: #5af5c8;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --s1: #ff6b6b;
    --s2: #ffd93d;
    --s3: #6bcbff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 24px 16px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .subtitle { color: var(--muted); font-size: .8rem; }

  .weeks { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  @media(max-width: 700px) { .weeks { grid-template-columns: 1fr; } }

  .week {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .week-header {
    padding: 12px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .week:nth-child(1) .week-header { background: #1a1f10; color: var(--accent); }
  .week:nth-child(2) .week-header { background: #101a1a; color: var(--accent2); }

  .day {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    transition: background .15s;
  }

  .day:hover { background: rgba(255,255,255,.03); }

  .day-label {
    font-size: .7rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .add-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    padding: 1px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
  }

  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .tasks { display: flex; flex-direction: column; gap: 4px; }

  .task {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,.04);
    border-radius: 6px;
    padding: 5px 8px;
    border-left: 3px solid var(--border);
    animation: fadeIn .2s ease;
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

  .task[data-p="1"] { border-left-color: var(--s1); }
  .task[data-p="2"] { border-left-color: var(--s2); }
  .task[data-p="3"] { border-left-color: var(--s3); }

  .task-check {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    accent-color: var(--accent);
  }

  .task-text {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
    outline: none;
    min-width: 0;
  }

  .task-text.done { text-decoration: line-through; color: var(--muted); }

  .task-prio {
    background: none;
    border: none;
    font-size: .75rem;
    cursor: pointer;
    padding: 0 2px;
    opacity: .6;
    transition: opacity .1s;
  }

  .task-prio:hover { opacity: 1; }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: .9rem;
    line-height: 1;
    opacity: 0;
    transition: opacity .15s;
  }

  .task:hover .del-btn { opacity: 1; }

  .legend {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    font-size: .7rem;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 2px; }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tb-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
  }

  .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div>
    <h1>CRONOGRAMA</h1>
    <div class="subtitle">2 semanas · editable · click para modificar</div>
  </div>
</header>

<div class="weeks" id="board"></div>

<div class="legend">
  <span><span class="dot" style="background:var(--s1)"></span>Alta prioridad</span>
  <span><span class="dot" style="background:var(--s2)"></span>Media</span>
  <span><span class="dot" style="background:var(--s3)"></span>Baja</span>
  <span><span class="dot" style="background:var(--border)"></span>Sin prioridad</span>
</div>

<script>
const DAYS = 14;
const PRIOICONS = ['⚪','🔴','🟡','🔵'];

function getStore() {
  try { return JSON.parse(localStorage.getItem('crono') || '{}'); } catch { return {}; }
}

function setStore(d) { localStorage.setItem('crono', JSON.stringify(d)); }

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const store = getStore();

  for (let w = 0; w < 2; w++) {
    const week = document.createElement('div');
    week.className = 'week';
    week.innerHTML = `<div class="week-header">Semana ${w+1}</div>`;

    for (let d = 1; d <= 7; d++) {
      const dayNum = w * 7 + d;
      const key = `d${dayNum}`;
      const tasks = store[key] || [];

      const dayEl = document.createElement('div');
      dayEl.className = 'day';
      dayEl.innerHTML = `
        <div class="day-label">
          <span>Día ${dayNum}</span>
          <button class="add-btn" onclick="addTask('${key}')">+ tarea</button>
        </div>
        <div class="tasks" id="${key}"></div>`;
      week.appendChild(dayEl);

      renderTasks(key, tasks);
      week.querySelector(`#${key}`).replaceWith(week.querySelector(`#${key}`) || dayEl.querySelector(`#${key}`));
    }

    board.appendChild(week);
  }

  // Re-render tasks after DOM is set
  const store2 = getStore();
  for (let i = 1; i <= DAYS; i++) {
    const key = `d${i}`;
    renderTasks(key, store2[key] || []);
  }
}

function renderTasks(key, tasks) {
  const container = document.getElementById(key);
  if (!container) return;
  container.innerHTML = '';
  tasks.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'task';
    el.dataset.p = t.p || 0;
    el.innerHTML = `
      <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleDone('${key}',${i},this)">
      <input type="text" class="task-text ${t.done?'done':''}" value="${escHtml(t.text)}" 
        oninput="editTask('${key}',${i},this.value)" 
        onkeydown="if(event.key==='Enter')addTask('${key}')">
      <button class="task-prio" title="Cambiar prioridad" onclick="cyclePrio('${key}',${i})">${PRIOICONS[t.p||0]}</button>
      <button class="del-btn" onclick="delTask('${key}',${i})" title="Eliminar">×</button>`;
    container.appendChild(el);
  });
}

function escHtml(s) { return (s||'').replace(/"/g,'&quot;'); }

function addTask(key) {
  const store = getStore();
  store[key] = store[key] || [];
  store[key].push({ text: '', done: false, p: 0 });
  setStore(store);
  renderTasks(key, store[key]);
  const inputs = document.querySelectorAll(`#${key} .task-text`);
  if (inputs.length) inputs[inputs.length-1].focus();
}

function editTask(key, i, val) {
  const store = getStore();
  if (!store[key]) return;
  store[key][i].text = val;
  setStore(store);
}

function toggleDone(key, i, el) {
  const store = getStore();
  if (!store[key]) return;
  store[key][i].done = el.checked;
  setStore(store);
  renderTasks(key, store[key]);
  // refocus
  const inputs = document.querySelectorAll(`#${key} .task-text`);
  if (inputs[i]) inputs[i].focus();
}

function cyclePrio(key, i) {
  const store = getStore();
  if (!store[key]) return;
  store[key][i].p = ((store[key][i].p || 0) + 1) % 4;
  setStore(store);
  renderTasks(key, store[key]);
}

function delTask(key, i) {
  const store = getStore();
  if (!store[key]) return;
  store[key].splice(i, 1);
  setStore(store);
  renderTasks(key, store[key]);
}

function saveData() {
  const data = localStorage.getItem('crono') || '{}';
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cronograma.json';
  a.click();
}

function loadData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        JSON.parse(ev.target.result); // validate
        localStorage.setItem('crono', ev.target.result);
        buildBoard();
      } catch { alert('Archivo inválido'); }
    };
    r.readAsText(file);
  };
  inp.click();
}

function clearAll() {
  if (confirm('¿Limpiar todo el cronograma?')) {
    localStorage.removeItem('crono');
    buildBoard();
  }
}

buildBoard();
</script>
</body>
</html>
